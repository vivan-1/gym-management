databases:
  - name: gym-management-db
    plan: free
    databaseName: gym_management
    user: gym_admin

services:
  - type: web
    name: gym-management
    runtime: node
    plan: free
    buildCommand: |
      cd frontend && npm install && npx vite build &&
      cd ../backend && npm install && npx prisma generate && npx tsc
    startCommand: cd backend && npx prisma migrate deploy && node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gym-management-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
